<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="FocusFlow"/>
  <meta name="theme-color" content="#06060a"/>
  <link rel="manifest" href="/static/manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <title>FocusFlow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #06060a;
      --layer1:    #0d0d14;
      --layer2:    #13131e;
      --layer3:    #1a1a28;
      --line:      rgba(255,255,255,0.06);
      --line-bright: rgba(255,255,255,0.12);
      --text-1:    #f0f0fa;
      --text-2:    #5a5a7a;
      --text-3:    #28283a;
      --accent:    #7820ff;
      --accent-dim: rgba(120,32,255,0.15);
      --green:     #00ff88;
      --red:       #ff4060;
      --cyan:      #00c8ff;
      --font-ui:   'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --r-card:    18px;
      --r-sm:      12px;
      --r-xs:      8px;

      /* Session state color — JS updates this */
      --session:     #7820ff;
      --session-dim: rgba(120,32,255,0.18);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes dotPop {
      0%   { transform: scale(0.4); opacity: 0; }
      70%  { transform: scale(1.2); }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes shimmer {
      from { background-position: -200% center; }
      to   { background-position:  200% center; }
    }
    @keyframes breatheGlow {
      0%, 100% { filter: drop-shadow(0 0 6px var(--session)); }
      50%       { filter: drop-shadow(0 0 22px var(--session)) drop-shadow(0 0 48px var(--session-dim)); }
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    html { height: 100%; }
    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text-1);
      min-height: 100%;
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 999;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    ::-webkit-scrollbar { width: 0; }
    :focus-visible { outline: 2px solid var(--session); outline-offset: 3px; border-radius: var(--r-xs); }
    :focus:not(:focus-visible) { outline: none; }

    /* ── Page header ── */
    .page-header {
      padding: max(56px, calc(env(safe-area-inset-top) + 48px)) 20px 16px;
    }
    .page-header h1 {
      font-size: 26px; font-weight: 800; letter-spacing: -0.5px;
    }

    /* ── Bottom nav ── */
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      background: rgba(6,6,10,0.94);
      backdrop-filter: saturate(200%) blur(28px);
      -webkit-backdrop-filter: saturate(200%) blur(28px);
      border-top: 1px solid var(--line);
      display: flex;
      padding: 8px 8px max(16px, env(safe-area-inset-bottom));
      gap: 4px;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 4px; padding: 8px 0;
      text-decoration: none; font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-3);
      border-radius: 12px;
      transition: color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item.active {
      color: var(--session);
      background: var(--session-dim);
    }
    .nav-item svg { width: 20px; height: 20px; stroke-width: 1.8; }

    /* ── Cards ── */
    .card {
      background: var(--layer1);
      border: 1px solid var(--line);
      border-radius: var(--r-card);
    }

    /* ── Section label ── */
    .section-label {
      padding: 24px 20px 10px;
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.2em;
      color: var(--text-3);
    }

    /* ── Forms ── */
    label.field-label {
      display: block; margin-bottom: 7px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-2);
    }
    input[type=text], select {
      width: 100%;
      background: var(--layer2); border: 1px solid var(--line);
      color: var(--text-1); border-radius: var(--r-sm);
      padding: 14px 16px; font-size: 15px;
      font-family: var(--font-ui);
      outline: none;
      -webkit-appearance: none; appearance: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type=text]:focus, select:focus {
      border-color: var(--session);
      box-shadow: 0 0 0 3px var(--session-dim);
    }
    input[type=text]::placeholder { color: var(--text-3); }

    /* ── Range slider ── */
    input[type=range] {
      width: 100%; appearance: none; -webkit-appearance: none;
      height: 3px; border-radius: 99px;
      background: var(--layer3); outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--session);
      box-shadow: 0 0 10px var(--session);
      cursor: pointer; transition: transform 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:active { transform: scale(1.25); }

    /* ── Toggle switch ── */
    .toggle {
      position: relative; width: 44px; height: 24px; flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; border-radius: 99px;
      background: var(--layer3); cursor: pointer;
      transition: background 0.25s;
    }
    .toggle-track::before {
      content: ''; position: absolute;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--text-2); top: 3px; left: 3px;
      transition: transform 0.25s, background 0.25s;
    }
    .toggle input:checked + .toggle-track { background: var(--session); }
    .toggle input:checked + .toggle-track::before {
      transform: translateX(20px); background: #fff;
    }

    /* ── Buttons ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 16px;
      background: var(--session); color: #fff;
      border: none; border-radius: var(--r-sm);
      font-size: 14px; font-weight: 700; font-family: var(--font-ui);
      cursor: pointer; text-decoration: none;
      letter-spacing: 0.04em; text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.12s, box-shadow 0.2s;
      box-shadow: 0 0 24px var(--session-dim), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .btn:active { opacity: 0.88; transform: scale(0.98); }
    .btn-ghost { background: var(--layer2); color: var(--text-2);
      box-shadow: none; border: 1px solid var(--line); }
    .btn-ghost:hover { border-color: var(--line-bright); }
    .btn-sm { width: auto; padding: 9px 16px; font-size: 11px; border-radius: var(--r-xs); }

    /* ── Flash messages ── */
    .flash {
      margin: 8px 16px; padding: 12px 16px; border-radius: var(--r-sm);
      font-size: 13px; font-weight: 600; animation: fadeUp 0.3s ease both;
    }
    .flash.success { background: rgba(0,255,136,0.07); color: var(--green); border: 1px solid rgba(0,255,136,0.15); }
    .flash.error   { background: rgba(255,64,96,0.07);  color: var(--red);   border: 1px solid rgba(255,64,96,0.15); }

    /* ── Empty state ── */
    .empty {
      padding: 60px 24px; text-align: center;
      color: var(--text-2); font-size: 14px; line-height: 1.9;
    }
    .empty a { color: var(--session); text-decoration: none; font-weight: 700; }

    /* ── Focus mode ── */
    body.focus-mode .nav,
    body.focus-mode .focus-hide { display: none !important; }
  </style>
</head>
<body>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
    <div class="flash {{ cat }}">{{ msg }}</div>
  {% endfor %}
{% endwith %}

{% block content %}{% endblock %}

<nav class="nav" aria-label="Main navigation">
  <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3" stroke-linecap="round"/>
    </svg>
    Timer
  </a>
  <a href="/tasks" class="nav-item {% if request.path == '/tasks' %}active{% endif %}">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Tasks
  </a>
  <a href="/history" class="nav-item {% if request.path == '/history' %}active{% endif %}">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path d="M3 3v18h18" stroke-linecap="round"/><path d="M7 16l4-4 4 4 4-6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Stats
  </a>
  <a href="/settings" class="nav-item {% if request.path == '/settings' %}active{% endif %}">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke-linecap="round"/>
    </svg>
    Settings
  </a>
</nav>

{% block scripts %}{% endblock %}
</body>
</html>
