{% extends "base.html" %}
{% block title %}Clock — FocusFlow{% endblock %}
{% block content %}

<style>
  /* ── Mode toggle bar ── */
  .mode-toggle {
    position: sticky;
    top: max(0px, env(safe-area-inset-top));
    z-index: 20;
    display: flex;
    gap: 1px;
    background: var(--layer2);
    border-bottom: 1px solid var(--line);
    padding: 0 20px;
  }

  .mode-btn {
    flex: 1;
    min-height: 44px;
    padding: 14px 0;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-3);
    transition: color 0.3s, border-bottom 0.3s;
    border-bottom: 3px solid transparent;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mode-btn.active {
    color: var(--session);
    border-bottom-color: var(--session);
  }

  /* ── Clock container ── */
  .clock-main {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: max(40px, calc(env(safe-area-inset-top) + 32px)) 20px 0;
    min-height: calc(100vh - 80px - env(safe-area-inset-bottom));
    position: relative;
    z-index: 1;
  }

  /* Ring and display (reuse from timer) */
  .ring-wrap {
    position: relative;
    width: 260px;
    height: 260px;
    flex-shrink: 0;
    margin-top: 32px;
  }

  @media (max-width: 480px) {
    .ring-wrap {
      width: 240px;
      height: 240px;
    }
  }

  #timer-ring {
    transition: stroke-dashoffset 1.05s linear, stroke 0.4s ease;
  }

  #timer-ring.breathing {
    animation: breatheGlow 4s ease-in-out infinite;
  }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  #timer-display {
    font-family: var(--font-mono);
    font-size: 54px;
    font-weight: 700;
    letter-spacing: -3px;
    line-height: 1;
    color: var(--text-1);
    transition: color 0.4s;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 40px;
  }

  .ctrl-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--layer2);
    border: 1px solid var(--line);
    color: var(--text-2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .ctrl-btn:active {
    transform: scale(0.88);
  }

  #play-pause-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--session);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 28px var(--session-dim), 0 0 60px var(--session-dim);
    transition: all 0.4s;
  }

  #play-pause-btn:active {
    transform: scale(0.92);
  }

  /* Breathing animation */
  @keyframes breatheGlow {
    0%, 100% { filter: drop-shadow(0 0 8px var(--session)); }
    50% { filter: drop-shadow(0 0 16px var(--session)); }
  }
</style>

<!-- Ambient glow -->
<div aria-hidden="true">
  <div id="glow-main" style="position:fixed;top:-100px;left:50%;transform:translateX(-50%);
    width:400px;height:400px;
    background:radial-gradient(circle,var(--session-dim),transparent 65%);
    pointer-events:none;z-index:0;transition:background 0.4s;"></div>
</div>

<!-- Mode toggle -->
<div class="mode-toggle">
  <button class="mode-btn active" onclick="switchMode('focus')">Focus</button>
  <button class="mode-btn" onclick="switchMode('fun')">Fun</button>
</div>

<!-- Clock -->
<div class="clock-main">
  <div class="ring-wrap">
    <svg width="260" height="260" viewBox="0 0 260 260"
         style="transform:rotate(-90deg);" aria-hidden="true">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop id="grad-stop-1" offset="0%" stop-color="#ff8c42"/>
          <stop id="grad-stop-2" offset="100%" stop-color="#ffb366"/>
        </linearGradient>
      </defs>
      <circle cx="130" cy="130" r="110" fill="none"
        stroke="var(--layer3)" stroke-width="7"/>
      <circle id="timer-ring" cx="130" cy="130" r="110" fill="none"
        stroke="url(#ringGrad)" stroke-width="7"
        stroke-linecap="round"
        stroke-dasharray="691"
        stroke-dashoffset="0"/>
    </svg>

    <div class="ring-center">
      <div id="timer-display">25:00</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn" onclick="resetTimer()" aria-label="Reset">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" viewBox="0 0 24 24">
        <path d="M3 12a9 9 0 1 0 9-9"/>
        <polyline points="3 7 3 12 8 12"/>
      </svg>
    </button>

    <button id="play-pause-btn" onclick="window.togglePlayPause()" aria-label="Start">
      <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
    </button>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script src="/static/js/clock.js"></script>
{% endblock %}
